<svg xmlns="http://www.w3.org/2000/svg">
    <!-- Another option is 0 0 14 14, 7 7 6.5 -->
    <symbol id="circle_light" viewBox="0 0 10 10">
        <circle cx="5" cy="5" r="4.5" stroke-width="0.5" fill="var(--backgroundColor, none)" stroke="var(--borderColor, currentColor)"/>
    </symbol>
    <symbol id="circle_thin" viewBox="0 0 10 10">
        <circle cx="5" cy="5" r="4.25" stroke-width="0.75" fill="var(--backgroundColor, none)" stroke="var(--borderColor, currentColor)"/>
    </symbol>
    <symbol id="circle_regular" viewBox="0 0 10 10">
        <circle cx="5" cy="5" r="4" stroke-width="1" fill="var(--backgroundColor, none)" stroke="var(--borderColor, currentColor)"/>
    </symbol>
</svg>
